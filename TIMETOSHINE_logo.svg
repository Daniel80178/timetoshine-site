<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="goldShine" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFF4C2"/>
      <stop offset="25%" stop-color="#FFD75E"/>
      <stop offset="55%" stop-color="#E5A82A"/>
      <stop offset="100%" stop-color="#8C5A0B"/>
    </radialGradient>
    <radialGradient id="bgDark" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#13263C"/>
      <stop offset="100%" stop-color="#03080F"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD75E" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#E5A82A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E5A82A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="innerDisc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E1F33"/>
      <stop offset="100%" stop-color="#050C15"/>
    </linearGradient>
    <path id="bottomArc" d="M 60 308 Q 256 482 452 308" fill="none"/>
  </defs>

  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="252" fill="url(#bgDark)"/>

  <!-- Gold outer ring + decorative inner ring -->
  <circle cx="256" cy="256" r="246" fill="none" stroke="url(#goldShine)" stroke-width="8"/>
  <circle cx="256" cy="256" r="228" fill="none" stroke="#FFD75E" stroke-width="1.5" opacity="0.4"/>

  <!-- Soft golden glow behind rays -->
  <circle cx="256" cy="256" r="200" fill="url(#sunGlow)"/>

  <!-- Sun rays: 12, alternating long/short -->
  <g transform="translate(256,256)" fill="url(#goldShine)" opacity="0.9">
    <g transform="rotate(0)"><polygon points="-8,-70 8,-70 0,-210"/></g>
    <g transform="rotate(30)"><polygon points="-5,-70 5,-70 0,-188"/></g>
    <g transform="rotate(60)"><polygon points="-8,-70 8,-70 0,-210"/></g>
    <g transform="rotate(90)"><polygon points="-5,-70 5,-70 0,-188"/></g>
    <g transform="rotate(120)"><polygon points="-8,-70 8,-70 0,-210"/></g>
    <g transform="rotate(150)"><polygon points="-5,-70 5,-70 0,-188"/></g>
    <g transform="rotate(180)"><polygon points="-8,-70 8,-70 0,-210"/></g>
    <g transform="rotate(210)"><polygon points="-5,-70 5,-70 0,-188"/></g>
    <g transform="rotate(240)"><polygon points="-8,-70 8,-70 0,-210"/></g>
    <g transform="rotate(270)"><polygon points="-5,-70 5,-70 0,-188"/></g>
    <g transform="rotate(300)"><polygon points="-8,-70 8,-70 0,-210"/></g>
    <g transform="rotate(330)"><polygon points="-5,-70 5,-70 0,-188"/></g>
  </g>

  <!-- Bullish accent: subtle upward arrow under monogram -->
  <g transform="translate(256,256)" fill="url(#goldShine)" opacity="0.75">
    <polygon points="-46,52 0,18 46,52 26,52 26,72 -26,72 -26,52"/>
  </g>

  <!-- Inner navy disc for monogram contrast -->
  <circle cx="256" cy="256" r="108" fill="url(#innerDisc)"/>
  <circle cx="256" cy="256" r="108" fill="none" stroke="url(#goldShine)" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#FFD75E" stroke-width="0.8" opacity="0.55"/>

  <!-- Central T2S monogram -->
  <text x="256" y="288" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="110" font-weight="bold"
        fill="url(#goldShine)"
        stroke="#3A1F00" stroke-width="1.2">T2S</text>

  <!-- Bottom arc wordmark -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold"
        fill="#FFE07A" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">TIME · TO · SHINE</textPath>
  </text>

  <!-- Tiny XAUUSD tag at top arc -->
  <text x="256" y="80" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold"
        fill="#FFD75E" letter-spacing="8" opacity="0.85">XAUUSD</text>
</svg>
