<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Page not found — TIMETOSHINE</title>
<meta name="description" content="The page you were looking for isn't here. Head back to the homepage."/>
<link rel="canonical" href="https://timetoshineofficial.com/404.html"/>
<link rel="icon" type="image/svg+xml" href="/TIMETOSHINE_logo.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0a0e14"/>
<style>
  :root{
    --bg:#0a0e14; --panel:#11161f; --panel-2:#161c27; --line:#1f2733;
    --text:#e6edf3; --muted:#8b9bb0; --gold:#d4af37; --gold-soft:#f0b90b;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:
      radial-gradient(800px 500px at 50% 0%, rgba(212,175,55,0.18) 0%, transparent 60%),
      radial-gradient(900px 500px at 50% 100%, rgba(88,166,255,0.08) 0%, transparent 60%),
      var(--bg);
    color:var(--text);min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .card{
    max-width:560px;width:100%;text-align:center;
    background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border:1px solid var(--line);border-radius:18px;
    padding:48px 36px;
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
  }
  .logo{width:64px;height:64px;margin:0 auto 24px;display:block;filter:drop-shadow(0 6px 18px rgba(212,175,55,0.3))}
  .code{
    font-size:96px;font-weight:900;line-height:1;letter-spacing:-0.04em;margin-bottom:8px;
    background:linear-gradient(180deg, var(--gold) 0%, #8a6d1c 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  h1{font-size:24px;font-weight:700;margin:0 0 12px;letter-spacing:-0.02em}
  p{color:var(--muted);font-size:16px;margin:0 0 30px;line-height:1.6}
  .actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;
    padding:14px 24px;border-radius:10px;
    text-decoration:none;font-weight:600;font-size:14.5px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary{
    background:linear-gradient(180deg, #e9c252 0%, #c69826 100%);
    color:#1a1306;
    box-shadow:0 8px 24px rgba(212,175,55,0.25);
  }
  .btn-primary:hover{transform:translateY(-2px)}
  .btn-ghost{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/TIMETOSHINE_logo.svg" alt=""/>
    <div class="code">404</div>
    <h1>This page doesn't exist (yet).</h1>
    <p>The link you followed is broken, mistyped, or pointing at something we haven't built. Head back to the homepage or one of the main pages below.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Back to Home</a>
      <a class="btn btn-ghost" href="/how-to-copy.html">How to Copy</a>
      <a class="btn btn-ghost" href="/faq.html">FAQ</a>
    </div>
  </div>
</body>
</html>
